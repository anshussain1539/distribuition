<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Upload – Shops & Items</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-lg border border-gray-100">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">Bulk Upload</h1>

        <div class="space-y-6">
            <!-- Type selection -->
            <div>
                <label class="block text-lg font-medium text-gray-700 mb-2">
                    Upload Type
                </label>
                <select id="uploadType" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white text-gray-800">
                    <option value="">Select type...</option>
                    <option value="shops">Shops</option>
                    <option value="items">Items</option>
                    <option value="suppliers">Suppliers</option>
                </select>
            </div>

            <!-- File input -->
            <div>
                <label class="block text-lg font-medium text-gray-700 mb-2">
                    Choose CSV or XLSX file
                </label>
                <div class="flex items-center justify-center w-full">
                    <label class="flex flex-col w-full h-40 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer hover:border-blue-400 transition-colors bg-gray-50 hover:bg-blue-50/30">
                        <div class="flex flex-col items-center justify-center pt-10">
                            <svg class="w-12 h-12 text-gray-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <p class="pt-3 text-sm text-gray-600">
                                <span class="font-semibold text-blue-600">Click to upload</span> or drag & drop
                            </p>
                            <p class="text-xs text-gray-500 mt-1">CSV or XLSX only • max 10MB recommended</p>
                        </div>
                        <input id="fileInput" type="file" accept=".csv,.xlsx" class="hidden" />
                    </label>
                </div>
            </div>

            <!-- Selected file name -->
            <div id="fileName" class="text-sm text-gray-600 min-h-[1.25rem]"></div>

            <!-- Preview area -->
            <div id="previewContainer" class="hidden mt-4 border border-gray-200 rounded-lg overflow-hidden bg-white">
                <div class="bg-gray-50 px-4 py-2 border-b font-medium text-gray-700">
                    Data Preview (first 5 rows)
                </div>
                <div class="overflow-x-auto">
                    <table id="previewTable" class="min-w-full divide-y divide-gray-200 text-sm">
                        <thead class="bg-gray-50">
                            <tr id="previewHeader"></tr>
                        </thead>
                        <tbody id="previewBody" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

            <!-- Upload button & status -->
            <div class="pt-4">
                <button id="uploadBtn" 
                        disabled
                        class="w-full py-3 px-6 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 disabled:bg-gray-400 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2">
                    <span id="btnText">Upload File</span>
                    <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>

                <p id="status" class="mt-4 text-center text-sm min-h-[1.5rem]"></p>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadType = document.getElementById('uploadType');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileNameEl = document.getElementById('fileName');
        const previewContainer = document.getElementById('previewContainer');
        const previewHeader = document.getElementById('previewHeader');
        const previewBody = document.getElementById('previewBody');
        const statusEl = document.getElementById('status');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');

        let selectedFile = null;

        // Enable/disable upload button
        function updateButtonState() {
            uploadBtn.disabled = !selectedFile || !uploadType.value;
        }

        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (!selectedFile) return;

            fileNameEl.textContent = selectedFile.name;
            statusEl.textContent = '';
            previewContainer.classList.add('hidden');
            previewHeader.innerHTML = '';
            previewBody.innerHTML = '';

            showPreview(selectedFile);
            updateButtonState();
        });

        uploadType.addEventListener('change', updateButtonState);

        // Simple preview (first 5 rows)
        async function showPreview(file) {
            if (!file.name.endsWith('.xlsx') && !file.name.endsWith('.csv')) return;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                if (json.length === 0) return;

                // Header
                const headerRow = document.createElement('tr');
                json[0].forEach(cell => {
                    const th = document.createElement('th');
                    th.className = 'px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider';
                    th.textContent = cell || '(empty)';
                    headerRow.appendChild(th);
                });
                previewHeader.appendChild(headerRow);

                // First 5 data rows (skip header)
                json.slice(1, 6).forEach(row => {
                    const tr = document.createElement('tr');
                    row.forEach(cell => {
                        const td = document.createElement('td');
                        td.className = 'px-4 py-3 whitespace-nowrap text-sm text-gray-700';
                        td.textContent = cell;
                        tr.appendChild(td);
                    });
                    previewBody.appendChild(tr);
                });

                previewContainer.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Cannot preview file – wrong format?';
                statusEl.className = 'mt-4 text-center text-sm text-red-600';
            }
        }

        // Upload
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !uploadType.value) return;

            statusEl.textContent = 'Uploading...';
            statusEl.className = 'mt-4 text-center text-sm text-blue-600';
            btnText.textContent = 'Uploading';
            spinner.classList.remove('hidden');
            uploadBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch(`/api/v1/bulk/upload/${uploadType.value}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    statusEl.textContent = data.message || 'Upload successful!';
                    statusEl.className = 'mt-4 text-center text-sm text-green-600 font-medium';
                } else {
                    statusEl.textContent = data.detail || 'Upload failed';
                    statusEl.className = 'mt-4 text-center text-sm text-red-600';
                }
            } catch (err) {
                statusEl.textContent = 'Network error: ' + err.message;
                statusEl.className = 'mt-4 text-center text-sm text-red-600';
            } finally {
                btnText.textContent = 'Upload File';
                spinner.classList.add('hidden');
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
